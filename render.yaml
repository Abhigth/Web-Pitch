services:
  # Background Worker
  - type: worker
    name: web-pitch-worker
    env: node
    buildCommand: npm install && npx playwright install chromium --with-deps
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: web-pitch-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: web-pitch-db
          property: connectionString

  # Redis Queue
  - type: redis
    name: web-pitch-redis
    ipAllowList: [] # internal only

databases:
  # Managed PostgreSQL Instance
  - name: web-pitch-db
    databaseName: webpitch
    user: webpitch
